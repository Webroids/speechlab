<!doctype html><meta charset="utf-8"><title>Side nav</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 0; min-height: 380px; display: flex; }

  aside {
    width: 224px;
    min-height: 380px;
    background: var(--card);
    border-right: 1px solid var(--vl-hairline);
    padding: 18px 0 16px;
    display: flex;
    flex-direction: column;
    box-shadow: var(--vl-inset);
  }

  /* Brand block — coral glyph + mono wordmark + tiny italic accent */
  .brand { padding: 0 18px 14px; }
  .brand-row { display: flex; align-items: center; gap: 10px; }
  .logo {
    width: 30px; height: 30px; border-radius: 9px;
    background: var(--vl-coral);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px oklch(0.70 0.20 35 / 25%);
  }
  .logo svg { width: 15px; height: 15px; stroke: var(--background); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .wordmark { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.16em; font-weight: 500; }
  .accent { display: block; font-family: var(--font-display); font-style: italic; font-size: 13px; color: var(--muted-foreground); margin-top: 4px; padding-left: 40px; letter-spacing: -0.01em; }

  /* Schnell üben — coral CTA, dice icon for playfulness */
  .quick {
    margin: 0 12px 14px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 11px 12px; border-radius: 14px;
    background: var(--foreground); color: var(--background);
    font-size: 13px; font-weight: 600;
    border: none; cursor: pointer;
    box-shadow: 0 2px 8px oklch(0.14 0.015 55 / 12%);
  }
  .quick svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* Nav items — coloured dot prefix, coral-tinted active state */
  nav { display: flex; flex-direction: column; gap: 2px; padding: 0 10px; }
  a {
    display: flex; align-items: center; gap: 11px;
    padding: 10px 12px;
    border-radius: 12px;
    font-size: 13.5px; font-weight: 500;
    color: var(--muted-foreground);
    text-decoration: none;
    position: relative;
  }
  a .ico { width: 18px; height: 18px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: var(--muted-foreground); }
  a .ico svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
  a .dot { position: absolute; right: 12px; width: 6px; height: 6px; border-radius: 9999px; opacity: 0; transition: opacity 150ms; }

  a.active {
    background: var(--vl-coral-bg);
    color: var(--vl-coral);
  }
  a.active .ico { color: var(--vl-coral); }
  a.active .ico svg { stroke-width: 2.1; }
  a.active .dot { background: var(--vl-coral); opacity: 1; }

  a:hover:not(.active) {
    background: oklch(0.14 0.015 55 / 4%);
    color: var(--foreground);
  }
  a:hover:not(.active) .ico { color: var(--foreground); }

  /* Footer — small italic streak counter */
  .footer {
    margin-top: auto;
    padding: 12px 16px 4px;
    border-top: 1px solid var(--vl-hairline);
    display: flex; align-items: baseline; gap: 6px;
  }
  .streak-num { font-family: var(--font-display); font-feature-settings: 'tnum'; font-size: 18px; line-height: 1; letter-spacing: -0.03em; color: var(--vl-coral); }
  .streak-lab { font-size: 11px; color: var(--muted-foreground); }
  .streak-em { font-family: var(--font-display); font-style: italic; font-size: 11.5px; color: var(--muted-foreground); margin-left: auto; }

  /* Right preview space */
  .right { flex: 1; padding: 28px 32px; }
  .lab { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted-foreground); margin-bottom: 6px; }
  h1 { font-family: var(--font-display); font-size: 32px; line-height: 1.1; letter-spacing: -0.02em; }
  h1 em { color: var(--muted-foreground); }
</style>
<aside>
  <div class="brand">
    <div class="brand-row">
      <div class="logo">
        <svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
      </div>
      <span class="wordmark">SPEECHLAB</span>
    </div>
    <span class="accent">deine Stimme.</span>
  </div>

  <button class="quick">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="4"/><circle cx="8.5" cy="8.5" r="1.2" fill="currentColor"/><circle cx="15.5" cy="8.5" r="1.2" fill="currentColor"/><circle cx="12" cy="12" r="1.2" fill="currentColor"/><circle cx="8.5" cy="15.5" r="1.2" fill="currentColor"/><circle cx="15.5" cy="15.5" r="1.2" fill="currentColor"/></svg>
    Schnell üben
  </button>

  <nav>
    <a class="active">
      <span class="ico"><svg viewBox="0 0 24 24"><path d="M3 11.5L12 4l9 7.5"/><path d="M5 10v10a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V10"/></svg></span>
      Today
      <span class="dot"></span>
    </a>
    <a>
      <span class="ico"><svg viewBox="0 0 24 24"><path d="M4 19V5a2 2 0 0 1 2-2h12v18H6a2 2 0 0 1-2-2z"/><path d="M6 17h12"/></svg></span>
      Bibliothek
    </a>
    <a>
      <span class="ico"><svg viewBox="0 0 24 24"><path d="M15 3H6a3 3 0 0 0 0 6h12"/><path d="M21 3h-9v9"/><path d="M21 12V3"/><path d="M6 9v9a3 3 0 0 0 3 3h12v-9"/></svg></span>
      Themen
    </a>
    <a>
      <span class="ico"><svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></span>
      Frameworks
    </a>
    <a>
      <span class="ico"><svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg></span>
      Fortschritt
    </a>
  </nav>

  <div class="footer">
    <span class="streak-num">12</span>
    <span class="streak-lab">Tage Streak</span>
    <span class="streak-em">stark.</span>
  </div>
</aside>

<div class="right">
  <p class="lab">FORTSCHRITT</p>
  <h1>Deine <em>Entwicklung</em></h1>
</div>
