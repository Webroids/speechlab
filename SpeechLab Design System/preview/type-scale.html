<!doctype html><meta charset="utf-8"><title>Type scale</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 24px 32px; }
  .row { display: grid; grid-template-columns: 110px 1fr; gap: 12px; align-items: baseline; padding: 8px 0; border-bottom: 1px solid var(--vl-hairline); }
  .row:last-child { border-bottom: none; }
  .meta { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted-foreground); }
  .ser { font-family: var(--font-display); font-weight: 400; letter-spacing: -0.02em; }
  .sans { font-family: var(--font-sans); }
</style>
