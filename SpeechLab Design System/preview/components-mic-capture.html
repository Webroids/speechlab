<!doctype html><meta charset="utf-8"><title>Mic capture</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 0; display: grid; grid-template-columns: 1fr 1fr; min-height: 100vh; }
  .stage {
    padding: 28px 24px;
    display: flex; flex-direction: column; align-items: center; gap: 22px;
  }
  .stage.light { background: var(--background); color: var(--foreground); }
  .stage.dark  { background: var(--vl-dark-bg); color: var(--vl-dark-ink); }

  .mode-tag {
    position: absolute; top: 14px;
    font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.14em;
    text-transform: uppercase; opacity: 0.5;
  }
  .light .mode-tag { color: var(--muted-foreground); left: 22px; }
  .dark  .mode-tag { color: var(--vl-dark-muted); left: calc(50% + 22px); }

  .topic {
    font-family: var(--font-display);
    font-size: 19px; line-height: 1.3;
    letter-spacing: -0.015em; text-align: center;
    max-width: 26ch;
  }
  .light .topic em { color: var(--muted-foreground); }
  .dark  .topic em { color: var(--vl-dark-muted); }

  .mic {
    width: 84px; height: 84px; border-radius: 9999px;
    background: var(--vl-coral);
    display: flex; align-items: center; justify-content: center;
    border: none; cursor: pointer;
    box-shadow: 0 0 0 8px oklch(0.70 0.20 35 / 16%);
  }
  .mic svg { width: 28px; height: 28px; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .light .mic svg { stroke: var(--background); }
  .dark  .mic svg { stroke: var(--vl-dark-bg); }

  .wave { display: flex; gap: 3px; align-items: center; height: 18px; }
  .wave > span { display: block; width: 3px; background: var(--vl-coral); border-radius: 2px; }

  .timer {
    font-family: var(--font-display);
    font-feature-settings: 'tnum';
    font-size: 56px; line-height: 1; letter-spacing: -0.035em;
  }
  .remaining {
    font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .light .remaining { color: var(--muted-foreground); }
  .dark  .remaining { color: var(--vl-dark-muted); }

  .stop { background: none; border: none; font-size: 12.5px; cursor: pointer; padding: 6px 10px; display: inline-flex; align-items: center; gap: 6px; }
  .light .stop { color: var(--muted-foreground); }
  .dark  .stop  { color: var(--vl-dark-muted); }
  .stop svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 1.75; }
</style>

<div class="stage light" style="position: relative;">
  <span class="mode-tag">LIGHT</span>
  <p class="topic">Verteidige eine Designentscheidung mit der dein Kunde nicht einverstanden <em>war.</em></p>
  <button class="mic">
    <svg viewBox="0 0 24 24"><line x1="9" y1="5" x2="9" y2="19"/><line x1="15" y1="5" x2="15" y2="19"/></svg>
  </button>
  <div class="wave" id="waveL"></div>
  <div class="timer">00:47</div>
  <span class="remaining">verbleibend</span>
  <button class="stop">
    <svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1.5"/></svg>
    Beenden
  </button>
</div>

<div class="stage dark" style="position: relative;">
  <span class="mode-tag">DARK · default</span>
  <p class="topic">Verteidige eine Designentscheidung mit der dein Kunde nicht einverstanden <em>war.</em></p>
  <button class="mic">
    <svg viewBox="0 0 24 24"><line x1="9" y1="5" x2="9" y2="19"/><line x1="15" y1="5" x2="15" y2="19"/></svg>
  </button>
  <div class="wave" id="waveD"></div>
  <div class="timer">00:47</div>
  <span class="remaining">verbleibend</span>
  <button class="stop">
    <svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1.5"/></svg>
    Beenden
  </button>
</div>

<script>
  for (const id of ['waveL', 'waveD']) {
    const wave = document.getElementById(id);
    for (let i = 0; i < 20; i++) {
      const h = 4 + Math.abs(Math.sin(i * 0.7)) * 12 + Math.random() * 3;
      wave.insertAdjacentHTML('beforeend', `<span style="height:${h}px"></span>`);
    }
  }
</script>
