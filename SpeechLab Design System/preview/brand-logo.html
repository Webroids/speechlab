<!doctype html><meta charset="utf-8"><title>Logo</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 24px 32px; display: grid; grid-template-columns: auto 1fr auto; gap: 28px; align-items: center; }
  .lockup { display: flex; align-items: center; gap: 14px; }
  .glyph { width: 56px; height: 56px; border-radius: 14px; background: var(--vl-coral); display: flex; align-items: center; justify-content: center; }
  .glyph svg { width: 28px; height: 28px; stroke: var(--background); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .wordmark { font-family: var(--font-display); font-size: 30px; font-weight: 400; letter-spacing: -0.025em; color: var(--foreground); line-height: 1; }
  .wordmark em { color: var(--muted-foreground); font-style: italic; }
  .stack { display: flex; flex-direction: column; gap: 6px; }
  .small-lab { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted-foreground); }
  .meta { font-size: 11.5px; color: var(--muted-foreground); }
  .scaled { display: flex; gap: 12px; align-items: center; }
  .scaled .g { background: var(--vl-coral); display: flex; align-items: center; justify-content: center; }
  .scaled .g svg { stroke: var(--background); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .g32 { width: 32px; height: 32px; border-radius: 8px; }
  .g32 svg { width: 16px; height: 16px; }
  .g24 { width: 24px; height: 24px; border-radius: 6px; }
  .g24 svg { width: 12px; height: 12px; }
  .g16 { width: 16px; height: 16px; border-radius: 4px; }
  .g16 svg { width: 10px; height: 10px; stroke-width: 2.5; }
</style>
<div class="lockup">
  <div class="glyph">
    <svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
  </div>
  <div class="stack">
    <span class="wordmark">Speech<em>Lab</em></span>
    <span class="meta">by Webroids · German communication training</span>
  </div>
</div>
<div></div>
<div class="scaled">
  <div class="g g32"><svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg></div>
  <div class="g g24"><svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg></div>
  <div class="g g16"><svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg></div>
</div>
