<!doctype html><meta charset="utf-8"><title>Score ramp</title>
<link rel="stylesheet" href="_base.css">
<style>
  body {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 16px; border: 1px solid var(--vl-hairline); border-radius: 16px; background: var(--card); box-shadow: var(--vl-inset); }
  .num { font-family: var(--font-display); font-size: 44px; line-height: 1; letter-spacing: -0.04em; }
  .label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted-foreground); }
  .rule { font-size: 11.5px; color: var(--muted-foreground); }
</style>
<div class="cell">
  <span class="label">≥80 SAGE</span>
  <span class="num" style="color: var(--vl-sage)">87</span>
  <span class="rule">Stark — kein Coaching nötig</span>
</div>
<div class="cell">
  <span class="label">60–79 AMBER</span>
  <span class="num" style="color: var(--vl-amber)">72</span>
  <span class="rule">Solide — Kleinigkeiten</span>
</div>
<div class="cell">
  <span class="label">&lt;60 CORAL</span>
  <span class="num" style="color: var(--vl-coral)">48</span>
  <span class="rule">Da geht mehr — nochmal</span>
</div>
